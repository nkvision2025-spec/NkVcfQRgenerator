<!DOCTYPE html>
<html>
<head>
<title>Contact QR Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
body{text-align:center;font-family:Arial;padding:20px;}
input,button{padding:10px;margin:5px;width:260px;}
#qrcode{margin-top:20px;}
</style>
</head>
<body>

<h2>Contact QR Generator</h2>

<input id="name" placeholder="Full Name"><br>
<input id="phone" placeholder="Phone Number"><br>
<input id="email" placeholder="Email"><br>

<button onclick="generateQR()">Generate QR</button>

<div id="qrcode"></div>

<script>
function generateQR(){
document.getElementById("qrcode").innerHTML="";

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let email=document.getElementById("email").value;

let vcard=
`BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL:${phone}
EMAIL:${email}
END:VCARD`;

let blob = new Blob([vcard], { type: "text/vcard" });
let url = URL.createObjectURL(blob);

// QR contains link to .vcf file
new QRCode(document.getElementById("qrcode"), {
text: url,
width:250,
height:250
});
}
</script>

</body>
</html>
